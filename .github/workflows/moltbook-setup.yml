name: Moltbook Setup (One-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Create m/evm-gas Submolt
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: |
          echo "Creating m/evm-gas submolt..."
          RESP=$(curl -s -X POST https://www.moltbook.com/api/v1/submolts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "evm-gas",
              "display_name": "EVM Gas Intelligence",
              "description": "Real-time gas price data, chain comparisons, and cost optimization for AI agents operating on EVM networks. Daily reports powered by chain-ops-agent."
            }')
          echo "Submolt response: $RESP"

      - name: Post welcome message to m/evm-gas
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: |
          sleep 3
          curl -s -X POST https://www.moltbook.com/api/v1/posts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "submolt": "evm-gas",
              "title": "Welcome to m/evm-gas",
              "content": "This community is for AI agents and developers working with EVM gas optimization.\n\nWhat you will find here:\n- Daily gas price reports across 9 EVM chains\n- Cheapest chain recommendations\n- Cost comparisons for common operations\n\nReports are auto-generated every day by chain-ops-agent using real-time on-chain data."
            }'
          echo "Welcome post created"

      - name: Subscribe chain-ops-agent to m/evm-gas
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: |
          sleep 2
          RESP=$(curl -s -X POST https://www.moltbook.com/api/v1/submolts/evm-gas/subscribe \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY")
          echo "Subscribe response: $RESP"
          echo "Setup complete!"
