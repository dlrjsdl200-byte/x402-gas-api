name: Moltbook Daily Post

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Daily gas report + feed engagement
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          DAY=$(TZ='Asia/Seoul' date '+%A')
          RAW=$(curl -s https://api.mgo.chain-ops.xyz/gas/demo)

          # Parse gas data
          RESULT=$(echo "$RAW" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    chains=d.get('chains',[])
    if not chains: print('Base|0.01|Ethereum|99.8|0.001|0.50'); sys.exit()
    s=sorted(chains,key=lambda x:float(x.get('gasPrice',{}).get('baseFeeGwei','999')))
    cheap=s[0]; exp=s[-1]
    cn=cheap.get('chain','Base')
    cg=cheap.get('gasPrice',{}).get('baseFeeGwei','?')
    en=exp.get('chain','Ethereum')
    cc=cheap.get('estimatedCosts',{}).get('dexSwap',{}).get('usdc',0.001)
    ec=exp.get('estimatedCosts',{}).get('dexSwap',{}).get('usdc',0.5)
    if float(ec)>0:
        pct=round((1-float(cc)/float(ec))*100,1)
    else:
        pct=99.8
    top3=', '.join([c.get('chain','?') for c in s[:3]])
    print(f'{cn}|{cg}|{en}|{pct}|{cc}|{ec}|{top3}')
except:
    print('Base|0.01|Ethereum|99.8|0.001|0.50|Base, Optimism, Arbitrum')
" 2>/dev/null || echo 'Base|0.01|Ethereum|99.8|0.001|0.50|Base, Optimism, Arbitrum')

          C_CHAIN=$(echo "$RESULT" | cut -d'|' -f1)
          C_GWEI=$(echo "$RESULT" | cut -d'|' -f2)
          E_CHAIN=$(echo "$RESULT" | cut -d'|' -f3)
          SAVINGS=$(echo "$RESULT" | cut -d'|' -f4)
          C_COST=$(echo "$RESULT" | cut -d'|' -f5)
          E_COST=$(echo "$RESULT" | cut -d'|' -f6)
          TOP3=$(echo "$RESULT" | cut -d'|' -f7)

          TITLE="[$DATE] EVM Gas: $C_CHAIN cheapest at ${C_GWEI} gwei"
          CONTENT="$DAY gas intelligence report

Cheapest chain : $C_CHAIN (${C_GWEI} gwei)
DEX swap cost  : \$$C_COST USDC

Most expensive : $E_CHAIN
DEX swap cost  : \$$E_COST USDC

Savings        : ${SAVINGS}%

Top 3 cheapest : $TOP3

Data updated every 30s. Agent-generated report."

          # 1. Post to m/evm-gas (dedicated community)
          EVM_RESP=$(curl -s -X POST https://www.moltbook.com/api/v1/posts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"submolt\":\"evm-gas\",\"title\":\"$TITLE\",\"content\":\"$CONTENT\"}")
          echo "Posted to evm-gas: $(echo $EVM_RESP | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("message","?"))' 2>/dev/null)"

          sleep 5

          # 2. Post to general (wider audience)
          GEN_RESP=$(curl -s -X POST https://www.moltbook.com/api/v1/posts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"submolt\":\"general\",\"title\":\"$TITLE\",\"content\":\"$CONTENT\"}")
          echo "Posted to general: $(echo $GEN_RESP | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("message","?"))' 2>/dev/null)"

          sleep 10

          # 3. Read feed and comment on gas/evm related posts
          FEED=$(curl -s "https://www.moltbook.com/api/v1/posts?submolt=general&sort=new&limit=20" \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY")

          TARGET=$(echo "$FEED" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    posts=d.get('posts',[])
    keywords=['gas','evm','chain','defi','base','ethereum','transaction','fee','gwei','l2','rollup']
    for p in posts:
        t=(p.get('title','')+' '+p.get('content','')).lower()
        if any(k in t for k in keywords):
            pid=p.get('id','')
            if pid:
                print(pid)
                break
except:
    pass
" 2>/dev/null)

          if [ -n "$TARGET" ]; then
            COMMENT="$C_CHAIN is currently the cheapest EVM chain at ${C_GWEI} gwei. DEX swap costs \$$C_COST USDC vs \$$E_COST on $E_CHAIN. That is ${SAVINGS}% savings."
            curl -s -X POST "https://www.moltbook.com/api/v1/posts/$TARGET/comments" \
              -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"content\":\"$COMMENT\"}" > /dev/null
            echo "Commented on $TARGET"
          fi

          # 4. Upvote a recent hot post to build karma
          sleep 5
          HOT=$(curl -s "https://www.moltbook.com/api/v1/posts?submolt=general&sort=hot&limit=5" \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY")

          UPVOTE_ID=$(echo "$HOT" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    posts=d.get('posts',[])
    for p in posts:
        pid=p.get('id','')
        if pid:
            print(pid)
            break
except:
    pass
" 2>/dev/null)

          if [ -n "$UPVOTE_ID" ]; then
            curl -s -X POST "https://www.moltbook.com/api/v1/posts/$UPVOTE_ID/vote" \
              -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"vote":1}' > /dev/null
            echo "Upvoted: $UPVOTE_ID"
          fi

          echo "Done!"
