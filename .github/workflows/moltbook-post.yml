name: Moltbook Daily Post

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Moltbook post script
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          POST_DATE: ${{ '' }}
          POST_DAY: ${{ '' }}
        run: |
          export POST_DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          export POST_DAY=$(TZ='Asia/Seoul' date '+%A')
          python3 .github/scripts/moltbook_post.py
