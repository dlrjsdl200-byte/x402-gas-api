name: Moltbook Daily Post

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Moltbook
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          RESPONSE=$(curl -s https://api.mgo.chain-ops.xyz/gas/demo)
          CHAIN=$(echo "$RESPONSE" | grep -o '"chain":"[^"]*"' | head -1 | cut -d'"' -f4)
          if [ -z "$CHAIN" ]; then CHAIN="Base"; fi

          curl -s -X POST https://www.moltbook.com/api/v1/posts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"submolt\":\"general\",\"title\":\"[$DATE] Cheapest EVM chain: $CHAIN\",\"content\":\"Gas intelligence by chain-ops.xyz\\nCheapest chain today: $CHAIN\\nFree demo: https://api.mgo.chain-ops.xyz/gas/demo\\nPowered by x402 on Base.\"}"

          echo "Posted!"
