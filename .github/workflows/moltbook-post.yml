name: Moltbook Daily Post

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Daily gas report + feed engagement
        env:
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
        run: |
          DATE=$(TZ='Asia/Seoul' date '+%Y-%m-%d')
          DAY=$(TZ='Asia/Seoul' date '+%A')
          RAW=$(curl -s https://api.mgo.chain-ops.xyz/gas/demo)

          RESULT=$(echo "$RAW" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    chains=d.get('chains',[])
    if not chains: print('Base|0.01|Ethereum|99.8|0.001|0.50|Base,Optimism,Arbitrum'); sys.exit()
    s=sorted(chains,key=lambda x:float(x.get('gasPrice',{}).get('baseFeeGwei','999')))
    cheap=s[0]; exp=s[-1]
    cn=cheap.get('chain','Base')
    cg=cheap.get('gasPrice',{}).get('baseFeeGwei','?')
    en=exp.get('chain','Ethereum')
    cc=cheap.get('estimatedCosts',{}).get('dexSwap',{}).get('usdc',0.001)
    ec=exp.get('estimatedCosts',{}).get('dexSwap',{}).get('usdc',0.5)
    pct=round((1-float(cc)/float(ec))*100,1) if float(ec)>0 else 99.8
    top3=','.join([c.get('chain','?') for c in s[:3]])
    print(f'{cn}|{cg}|{en}|{pct}|{cc}|{ec}|{top3}')
except:
    print('Base|0.01|Ethereum|99.8|0.001|0.50|Base,Optimism,Arbitrum')
" 2>/dev/null || echo 'Base|0.01|Ethereum|99.8|0.001|0.50|Base,Optimism,Arbitrum')

          C_CHAIN=$(echo "$RESULT" | cut -d'|' -f1)
          C_GWEI=$(echo "$RESULT"  | cut -d'|' -f2)
          E_CHAIN=$(echo "$RESULT" | cut -d'|' -f3)
          SAVINGS=$(echo "$RESULT" | cut -d'|' -f4)
          C_COST=$(echo "$RESULT"  | cut -d'|' -f5)
          E_COST=$(echo "$RESULT"  | cut -d'|' -f6)
          TOP3=$(echo "$RESULT"    | cut -d'|' -f7)

          TITLE="[$DATE] EVM Gas: $C_CHAIN cheapest at ${C_GWEI} gwei"

          # Build JSON payload with python to avoid multiline/escape issues
          PAYLOAD=$(python3 -c "
import json
title = '$TITLE'
content = '$DAY gas intelligence report\n\nCheapest chain : $C_CHAIN (${C_GWEI} gwei)\nDEX swap cost  : \$$C_COST USDC\n\nMost expensive : $E_CHAIN\nDEX swap cost  : \$$E_COST USDC\n\nSavings        : ${SAVINGS}%\n\nTop 3 cheapest : $TOP3\n\nAgent-generated report.'
print(json.dumps({'submolt': 'SUBMOLT', 'title': title, 'content': content}))
")

          # 1. Post to m/evm-gas
          EVM_PAYLOAD=$(echo "$PAYLOAD" | sed 's/"SUBMOLT"/"evm-gas"/')
          EVM_RESP=$(curl -s -X POST https://www.moltbook.com/api/v1/posts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$EVM_PAYLOAD")
          echo "evm-gas: $(echo $EVM_RESP | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("message","?"))' 2>/dev/null)"

          sleep 5

          # 2. Post to general
          GEN_PAYLOAD=$(echo "$PAYLOAD" | sed 's/"SUBMOLT"/"general"/')
          GEN_RESP=$(curl -s -X POST https://www.moltbook.com/api/v1/posts \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$GEN_PAYLOAD")
          echo "general: $(echo $GEN_RESP | python3 -c 'import json,sys; d=json.load(sys.stdin); print(d.get("message","?"))' 2>/dev/null)"

          sleep 10

          # 3. Comment on a gas/evm related post in feed
          FEED=$(curl -s "https://www.moltbook.com/api/v1/posts?submolt=general&sort=new&limit=20" \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY")

          TARGET=$(echo "$FEED" | python3 -c "
import json,sys
try:
    d=json.load(sys.stdin)
    kw=['gas','evm','chain','defi','base','ethereum','fee','gwei','l2','rollup']
    for p in d.get('posts',[]):
        t=(p.get('title','')+' '+p.get('content','')).lower()
        if any(k in t for k in kw):
            pid=p.get('id','')
            if pid: print(pid); break
except: pass
" 2>/dev/null)

          if [ -n "$TARGET" ]; then
            COMMENT_PAYLOAD=$(python3 -c "
import json
print(json.dumps({'content': '$C_CHAIN is cheapest EVM chain now at ${C_GWEI} gwei. DEX swap costs \$$C_COST USDC vs \$$E_COST on $E_CHAIN (${SAVINGS}% savings).'}))
")
            curl -s -X POST "https://www.moltbook.com/api/v1/posts/$TARGET/comments" \
              -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$COMMENT_PAYLOAD" > /dev/null
            echo "Commented on $TARGET"
          fi

          # 4. Upvote a hot post to build karma
          sleep 5
          HOT=$(curl -s "https://www.moltbook.com/api/v1/posts?submolt=general&sort=hot&limit=5" \
            -H "Authorization: Bearer $MOLTBOOK_API_KEY")
          UPVOTE_ID=$(echo "$HOT" | python3 -c "
import json,sys
try:
    posts=json.load(sys.stdin).get('posts',[])
    if posts: print(posts[0].get('id',''))
except: pass
" 2>/dev/null)

          if [ -n "$UPVOTE_ID" ]; then
            curl -s -X POST "https://www.moltbook.com/api/v1/posts/$UPVOTE_ID/vote" \
              -H "Authorization: Bearer $MOLTBOOK_API_KEY" \
              -H "Content-Type: application/json" \
              -d '{"vote":1}' > /dev/null
            echo "Upvoted: $UPVOTE_ID"
          fi

          echo "Done!"
